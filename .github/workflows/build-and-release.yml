name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  NUGET_SOURCE: 'https://api.nuget.org/v3/index.json'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Important for versioning
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    # Build + test the complete project graph from a clean checkout using the
    # SAME script CI and local developers run. If any source or test project in
    # the graph fails, this step (and therefore the whole build job) fails, and
    # the publish-* jobs below cannot run because they declare `needs: build`.
    - name: Build complete graph and run test projects (Release)
      run: scripts/ci-graph-test.sh --configuration Release --require-clean

    - name: Pack
      run: |
        # Determine version
        if [[ $GITHUB_REF == refs/tags/v* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION=$(date +%Y.%m.%d)-rc.$GITHUB_RUN_NUMBER
        fi

        echo "VERSION=$VERSION" >> $GITHUB_ENV

        # Pack every documented library exactly once. Each src project produces
        # its own package (the umbrella Andy.Tui is a dependency meta-package that
        # references them; Andy.Tui.CliWidgets is an opt-in add-on). Iterating the
        # src project files guarantees each documented package is emitted once and
        # none are silently dropped.
        for proj in $(find src -maxdepth 2 -name '*.csproj' | sort); do
          echo "Packing $proj"
          # No --no-build: some documented projects (e.g. Andy.Tui.CliWidgets)
          # are not part of the solution graph yet, so let pack build each one
          # from the already-restored Release output.
          dotnet pack "$proj" \
            --configuration Release \
            --output ./artifacts \
            -p:PackageVersion=$VERSION
        done

        echo "Produced packages:"
        ls -1 ./artifacts/*.nupkg
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: ./artifacts/*.nupkg
        retention-days: 7

  publish-prerelease:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: nuget-packages
        path: ./artifacts
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Publish to NuGet
      run: |
        dotnet nuget push ./artifacts/*.nupkg \
          --source ${{ env.NUGET_SOURCE }} \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --skip-duplicate

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: nuget-packages
        path: ./artifacts
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Publish to NuGet
      run: |
        dotnet nuget push ./artifacts/*.nupkg \
          --source ${{ env.NUGET_SOURCE }} \
          --api-key ${{ secrets.NUGET_API_KEY }}
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./artifacts/*.nupkg
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}