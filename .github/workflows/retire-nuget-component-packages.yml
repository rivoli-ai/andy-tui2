name: Retire legacy Andy.Tui component packages

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type RETIRE_ANDY_TUI_COMPONENTS to unlist every legacy component version'
        required: true
        type: string

permissions:
  contents: read

jobs:
  retire:
    if: github.ref == 'refs/heads/main' && inputs.confirmation == 'RETIRE_ANDY_TUI_COMPONENTS'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Inventory legacy component versions
        run: scripts/retire-nuget-component-packages.sh

      - name: Unlist legacy component versions
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_RETIRE_API_KEY }}
          NUGET_DELETE_DELAY_SECONDS: '15'
        run: scripts/retire-nuget-component-packages.sh --execute

      - name: Verify every legacy component version is unlisted
        run: |
          # NuGet's registration catalog can briefly lag successful delete
          # requests. Retry the read-only assertion before reporting failure.
          for attempt in {1..10}; do
            if scripts/retire-nuget-component-packages.sh --assert-none-listed; then
              exit 0
            fi
            [[ "${attempt}" -eq 10 ]] && break
            echo "NuGet registration has not converged; retrying in 30 seconds."
            sleep 30
          done
          exit 1
