name: ci

# Pull-request / push validation.
#
# This workflow and build-and-release.yml deliberately share ONE build+test
# definition: scripts/ci-graph-test.sh. This job validates the complete project
# graph from a clean checkout in both Debug and Release; build-and-release.yml
# reuses the same script for the Release gate that guards publishing. See #27.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  graph-build-test:
    runs-on: macos-latest
    # The flexbox parity suite (real Chromium reference vs FlexLayout) is part of
    # CI now. RUN_PARITY=true makes ci-graph-test.sh include the Playwright
    # project in the graph test instead of excluding it, and gates the Chromium
    # install/cache steps below. See #39.
    env:
      RUN_PARITY: 'true'
    strategy:
      fail-fast: false
      matrix:
        configuration: [ Debug, Release ]
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Validate solution membership
        run: ./scripts/validate-solution.sh
      # The browser build is keyed on the pinned Microsoft.Playwright version so
      # a cache hit only occurs when the exact browser revision is still valid.
      - name: Cache Playwright browsers
        if: env.RUN_PARITY == 'true'
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/Andy.Tui.Parity.Playwright/Andy.Tui.Parity.Playwright.csproj') }}
      - name: Install Playwright Browsers (for parity tests)
        if: env.RUN_PARITY == 'true'
        run: |
          dotnet build tests/Andy.Tui.Parity.Playwright/Andy.Tui.Parity.Playwright.csproj -c ${{ matrix.configuration }}
          pwsh tests/Andy.Tui.Parity.Playwright/bin/${{ matrix.configuration }}/net8.0/playwright.ps1 install chromium
      - name: Build complete graph and run test projects (${{ matrix.configuration }})
        run: scripts/ci-graph-test.sh --configuration ${{ matrix.configuration }} --require-clean
